name: "Code Quality Checks"

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install ruff
      run: |
        python -m pip install --upgrade pip
        pip install ruff

    - name: Run ruff checks
      run: |
        ruff check .
        ruff format --check .

    - name: Install mypy
      run: |
        pip install mypy

    - name: Run mypy
      run: |
        mypy .
        mypy --strict .   